appId: com.vblast.flipaclip
env:
    MOVIE: "Movie "
---
- swipe:
    start: "50%, 50%"
    end: "70%,70%"
    duration: 1000
- tapOn:
    id: "ic_share_ios_24"
- tapOn: "My Project Layout 3"
- eraseText
- inputText: ${MOVIE}
- tapOn: "intro"
- tapOn: "Make Movie"
- assertVisible: "YouTube"
- assertVisible: "Save to Photos"

