appId: com.vblast.flipaclip
env:
    USER: "xidapiy844@epaynine.com"
    PASSWORD: "123456"
---
- launchApp: com.vblast.flipaclip
- tapOn: "Settings"
- tapOn: "Accounts"
- tapOn: "FlipaClip"
- tapOn: "SIGN IN"
- tapOn: "Sign in with email"
- tapOn: "Email address"
- inputText: ${USER}
- tapOn: "Done"
- tapOn: "Password"
- inputText: ${PASSWORD}
- tapOn: "Done"
- tapOn: "SIGN IN"
- assertVisible: "FlipaClip Contest"
- extendedWaitUntil:
    visible: "Profile"
    timeout: 5000
- tapOn: "Profile"
- extendedWaitUntil:
    visible: "First name"
    timeout: 10000
