appId: com.vblast.flipaclip
tags:
  - timeline
  - track
---
- tapOn:
    id: addButton
- tapOn:
    id: buttonItem
    index: 0
- tapOn:
    id: addButton
- tapOn:
    id: buttonItem
    index: 1
- repeat:
    times: 2
    commands:
        - swipe:
            from:
              id: trackHeader
              index: 1
            direction: DOWN
- longPressOn:
    id: trackName
    index: 0
- tapOn:
    id: trackName
    index: 1
- repeat:
    times: 2
    commands:
        - swipe:
            from:
              id: trackHeader
              index: 1
            direction: UP
- tapOn:
    id: trackName
    index: 1
- assertVisible:
    id: checkBoxAction
    index: 1
