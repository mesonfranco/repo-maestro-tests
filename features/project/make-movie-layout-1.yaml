appId: com.vblast.flipaclip
tags:
  - project
  - makeMovie
env:
  PROJECT: "My Project 1"
  MOVIE: "Movie"
---
- launchApp: com.vblast.flipaclip
- setPermissions:
    permissions:
      storage: allow
- tapOn: Add Project
- tapOn: Name your animation
- inputText: ${PROJECT}
- hideKeyboard
- tapOn:
    id: "action_confirm"
- takeScreenshot: "../baseline/legacy-studio"
- repeat:
    times: 11
    commands:
      - tapOn: Add Frame
- tapOn:
    id: "actionMakeMovie"
- assertVisible: 12 FRAMES
- assertVisible: 1 SECOND
- tapOn:
    id: movieName
- eraseText
- inputText: ${MOVIE}
- hideKeyboard
- tapOn:
    id: "actionBuild"
- runFlow:
    when:
        visible: We need your permission to access photos and media on your device to save your movie.
    commands:
        - tapOn: "Allow"
- runFlow:
    when:
        visible:  Allow FlipaClip to delete this video?
    commands:
        - tapOn: "Allow"
- tapOn: "YouTube"
- tapOn:
    id: "actionShare"
- assertVisible: "Upload complete!"
- assertVisible: "Make sure to follow FlipaClip"
