appId: com.vblast.flipaclip
tags:
  - project
  - makeMovie
env:
  MOVIE: "Movie 2"
---
- setPermissions:
    permissions:
      storage: allow
- takeScreenshot: "../current/studio-layout-2"
- repeat:
    times: 11
    commands:
      - tapOn: Add Frame
- tapOn: Share
- longPressOn:
    id: "movieName"
- eraseText
- inputText: ${MOVIE}
- hideKeyboard
- assertVisible: 12 FRAMES
- assertVisible: 1 SECOND
- tapOn: MAKE MOVIE
- assertVisible: Youtube