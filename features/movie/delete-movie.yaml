appId: com.vblast.flipaclip
---
- launchApp: com.vblast.flipaclip
- swipe:
    from:
        id: stackContainer
    direction: LEFT
- longPressOn:
    id: "coverImage"
    index: 0
- tapOn:
    id: "coverImage"
    index: 1
- tapOn:
    id: "coverImage"
    index: 2
- tapOn:
    id: "ivDelete"

- tapOn: "Delete"
- assertNotVisible:
    id: "tvActionDescription"


