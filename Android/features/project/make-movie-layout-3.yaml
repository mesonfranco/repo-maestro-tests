appId: com.vblast.flipaclip
tags:
  - project
  - makeMovie
env:
  MOVIE: "Movie 3"
---
- setPermissions:
    permissions:
      storage: allow
- takeScreenshot: "../current/studio-layout-3"
- swipe:
    start: "50%, 50%"
    end: "70%,70%"
    duration: 1000
- tapOn: Share
- longPressOn:
    id: movieName
- eraseText
- inputText: ${MOVIE}
- hideKeyboard
- tapOn: MAKE MOVIE
- assertVisible: Youtube
