appId: com.vblast.flipaclip
env:
  PROJECT_NAME: "Project edited"
---
- longPressOn:
    id: "coverImage"
    index: 2
- tapOn: "Edit"
- repeat:
    times: 2
    commands:
      - tapOn: "Name your animation"
- tapOn:
    id: "insertion_handle"
- tapOn: "Select all"
- eraseText
- inputText: ${PROJECT_NAME}
- tapOn: "Back"
- tapOn: "YouTube (720p)"
- tapOn: "Vimeo (1080p)"
- tapOn: "Back"
- tapOn:
    id: "actionFps"
- swipe:
    from: 12
    direction: UP
    duration: 400
- tapOn: "24"
- tapOn: "Back"
- tapOn: "SAVE CHANGES"
- assertVisible: "Project edited"
- assertVisible: "24 fps"