appId: com.vblast.flipaclip
env:
    EMAIL: "xidapiy844@epaynine.com"
    PASS: "123456"
---
- launchApp: com.vblast.flipaclip
- tapOn:
    id: "actionMenuButton"
- tapOn: "Accounts"
- tapOn: "FlipaClip"
- tapOn: "SIGN IN"
- tapOn: "Sign in with email"
- tapOn: "Email address"
- inputText: ${EMAIL}
- tapOn: "Password"
- inputText: ${PASS}
- hideKeyboard
- tapOn: "Sign in"
- assertVisible: "FlipaClip account"
- assertVisible: "Account information"
- tapOn: "Profile"
- assertVisible: "First name"
- assertVisible: "Last name"
- assertVisible: "Email"
- assertVisible: "Birthday"
- assertVisible: "Country"