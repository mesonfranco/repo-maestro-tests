appId: com.vblast.flipaclip
env:
  MOVIE_NAME: "Movie "
---
- swipe:
    start: "50%, 50%"
    end: "70%, 70%"
    duration: 500
- swipe:
    start: "25%, 25%"
    end: "87%, %87"
    duration: 500
- tapOn: Share
- tapOn: "Name your movie"
- eraseText
- inputText: ${MOVIE_NAME}
- tapOn: "Back"
- tapOn: "MAKE MOVIE"
- assertVisible: "Share"
- assertVisible: "Preview"
- assertVisible: "Upload"
- assertVisible: "YouTube"
- assertVisible: "TikTok"
- assertVisible: "More"