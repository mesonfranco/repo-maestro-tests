appId: com.vblast.flipaclip
tags:
  - api
---
- tapOn:
    id: "icon"
- tapOn: "Audio track"
- tapOn:
    id: "icon"
    index: 1
- tapOn: "Audio Library"
- assertVisible: "Fight - Sound FX"
- assertVisible: "Fun - Sound FX"
- assertVisible: "Machine - Sound FX"
- assertVisible: "Human - Sound FX"
- tapOn:
    id: "staticArrowIcon"
- assertVisible:
    id: "artworkImage"
- assertVisible: "Fight - Sound FX"
- tapOn:
    id: "imageView"
- extendedWaitUntil:
    visible: "$29.99 / year"
    timeout: 10000
- tapOn:
    id: "closeAction"
- tapOn: "Back"
- tapOn: "Close"
