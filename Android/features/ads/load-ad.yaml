appId: com.vblast.flipaclip
tags:
  - ads
env:
  PROJECT: "Load Ad"
---
- runFlow: "../project/create-generic-project.yaml"
- extendedWaitUntil:
    visible: "Classic"
    timeout: 5000
- tapOn:
    id: "icon"
- tapOn: "Audio track"
- tapOn:
    id: "icon"
    index: 1
- tapOn: "Add Audio"
- extendedWaitUntil:
    visible: "WATCH AD"
    timeout: 10000
- tapOn: "WATCH AD"
- assertNotVisible: "WATCH AD"